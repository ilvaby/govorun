<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Живой аватар: Губы шевелятся под русскую речь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(22, 33, 62, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 20px 24px 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        h1 {
            font-size: 1.7rem;
            text-align: center;
            margin-bottom: 16px;
            color: white;
            font-weight: 600;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Аватар с живым ртом */
        .avatar-stage {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 0 auto 20px;
            cursor: pointer;
        }

        .avatar-frame {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #0f3460;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.1);
            border: 3px solid rgba(255,255,255,0.2);
        }

        /* Фото пользователя или дефолтная картинка */
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* SVG рот, который будет анимироваться в реальном времени */
        .mouth-svg {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 70px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            pointer-events: none;
            z-index: 20;
            transition: all 0.03s linear;
        }

        .mouth-path {
            fill: #ff4d6d;
            stroke: #c9184a;
            stroke-width: 2.5;
            stroke-linecap: round;
            transition: d 0.04s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* Класс для дефолтного мультяшного режима (если нет фото) */
        .default-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #ffb347, #ff6b4a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .default-eyes {
            display: flex;
            gap: 25px;
            margin-bottom: 15px;
        }
        .default-eye {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
        }
        .default-eye::after {
            content: '';
            display: block;
            width: 12px;
            height: 12px;
            background: #1e1e2f;
            border-radius: 50%;
            margin: 6px 0 0 6px;
        }
        
        .avatar-frame.default-mode .avatar-img { display: none; }
        .avatar-frame.default-mode .default-face { display: flex; }
        .avatar-frame:not(.default-mode) .default-face { display: none; }
        .avatar-frame:not(.default-mode) .avatar-img { display: block; }

        /* Элементы управления */
        .photo-zone {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn-outline {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 18px;
            border-radius: 60px;
            color: white;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(0.97);
        }
        .voice-select {
            width: 100%;
            padding: 12px;
            background: #1e2a47;
            border: 1px solid #2e3b5e;
            border-radius: 32px;
            color: white;
            font-size: 0.85rem;
            margin: 12px 0;
            cursor: pointer;
        }
        .control-panel {
            background: #0a0f1c60;
            border-radius: 32px;
            padding: 12px 16px;
            margin: 16px 0;
        }
        .slider-group {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #ccc;
            margin-bottom: 8px;
            gap: 12px;
            align-items: center;
        }
        input[type="range"] {
            flex: 1;
            height: 4px;
            border-radius: 4px;
            background: #2e3b5e;
        }
        textarea {
            width: 100%;
            background: #0f1422cc;
            border: 1px solid #2a3456;
            border-radius: 28px;
            padding: 14px 18px;
            color: white;
            font-size: 0.9rem;
            resize: vertical;
            font-family: inherit;
            margin: 12px 0;
        }
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 8px 0;
        }
        .btn-primary {
            background: linear-gradient(95deg, #ff4d6d, #c9184a);
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            transition: 0.1s linear;
        }
        .btn-record {
            width: 56px;
            height: 56px;
            border-radius: 56px;
            background: radial-gradient(circle at 30% 20%, #ff6a6a, #b91c2c);
            font-size: 26px;
            padding: 0;
            box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6);
        }
        .recording {
            animation: pulseMic 0.9s infinite;
        }
        @keyframes pulseMic {
            0% { box-shadow: 0 0 0 0 #ff4d6d; transform: scale(1);}
            70% { box-shadow: 0 0 0 12px rgba(255,77,109,0); transform: scale(1.02);}
            100% { box-shadow: 0 0 0 0 rgba(255,77,109,0); transform: scale(1);}
        }
        .status-text {
            text-align: center;
            font-size: 0.7rem;
            color: #9ca3cf;
            margin-top: 12px;
        }
        .recognized-box {
            background: #00000055;
            border-radius: 28px;
            padding: 8px 16px;
            font-size: 0.8rem;
            color: #d1d5ff;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎤 ЖИВОЙ РОТ 🎭</h1>

    <div class="avatar-stage">
        <div class="avatar-frame default-mode" id="avatarFrame">
            <div class="default-face">
                <div class="default-eyes"><div class="default-eye"></div><div class="default-eye"></div></div>
                <div style="font-size: 18px; color:white; margin-top: 8px;">✨ Аватар ✨</div>
            </div>
            <img id="userPhoto" class="avatar-img" alt="ваше фото">
            <!-- Анимированный SVG рот -->
            <svg class="mouth-svg" viewBox="0 0 100 60" preserveAspectRatio="none">
                <path id="mouthPath" class="mouth-path" d="M 20,20 Q 50,10 80,20 Q 50,35 20,20" stroke-linecap="round"/>
            </svg>
        </div>
    </div>

    <div class="photo-zone">
        <label class="btn-outline">📸 Загрузить своё фото
            <input type="file" id="photoUpload" accept="image/*" style="display: none;">
        </label>
        <button id="resetAvatarBtn" class="btn-outline">🔄 Мультяшный режим</button>
    </div>

    <select id="voiceSelect" class="voice-select"></select>

    <div class="control-panel">
        <div class="slider-group"><span>🗣️ Скорость речи</span><input type="range" id="rateSlider" min="0.6" max="1.8" step="0.02" value="1.0"><span id="rateVal">1.0</span></div>
        <div class="slider-group"><span>🎚️ Высота тона</span><input type="range" id="pitchSlider" min="0.6" max="1.8" step="0.02" value="1.1"><span id="pitchVal">1.1</span></div>
        <div class="slider-group"><span>👄 Чувствительность рта</span><input type="range" id="mouthSense" min="0.3" max="1.8" step="0.02" value="1.0"><span id="senseVal">1.0</span></div>
    </div>

    <textarea id="textInput" rows="2" placeholder="✏️ Напиши любую фразу по-русски..."></textarea>

    <div class="button-group">
        <button id="speakBtn" class="btn-primary">📢 Озвучить</button>
        <button id="recordBtn" class="btn-primary btn-record">🎙️</button>
    </div>

    <div id="recognizedContainer" class="recognized-box" style="display: none;"></div>
    <div id="statusMessage" class="status-text">✨ Готов к работе. Напиши текст и рот заговорит!</div>
</div>

<script>
    // ---------- ЭЛЕМЕНТЫ ----------
    const avatarFrame = document.getElementById('avatarFrame');
    const userPhoto = document.getElementById('userPhoto');
    const photoUpload = document.getElementById('photoUpload');
    const resetAvatar = document.getElementById('resetAvatarBtn');
    const voiceSelect = document.getElementById('voiceSelect');
    const rateSlider = document.getElementById('rateSlider');
    const pitchSlider = document.getElementById('pitchSlider');
    const rateVal = document.getElementById('rateVal');
    const pitchVal = document.getElementById('pitchVal');
    const mouthSenseSlider = document.getElementById('mouthSense');
    const senseVal = document.getElementById('senseVal');
    const textInput = document.getElementById('textInput');
    const speakBtn = document.getElementById('speakBtn');
    const recordBtn = document.getElementById('recordBtn');
    const statusDiv = document.getElementById('statusMessage');
    const recognizedBox = document.getElementById('recognizedContainer');
    
    // SVG элемент рта
    const mouthPath = document.getElementById('mouthPath');
    
    // Параметры
    let currentUtterance = null;
    let selectedVoice = null;
    let animationFrame = null;
    let isSpeakingNow = false;
    let mouthIntensity = 0.0;      // 0..1 насколько открыт рот
    let mouthSensitivity = 1.0;
    
    // Web Speech API для распознавания
    let recognition = null;
    let isRecording = false;
    
    // ---------- ФУНКЦИЯ АНИМАЦИИ РТА (РЕАЛЬНО ШЕВЕЛИТСЯ) ----------
    // Рисуем разные формы рта в зависимости от интенсивности.
    function updateMouthShape(intensity) {
        // intensity: 0 = закрыт, 1 = широко открыт (гласная А)
        const t = Math.min(1.0, Math.max(0.0, intensity));
        // Плавная кривая для натуральности
        const openFactor = Math.pow(t, 0.8);
        
        // Координаты для SVG пути (рот выглядит органично)
        // Закрыт:  M 25,25 Q 50,18 75,25 Q 50,32 25,25
        // Открыт:  M 15,25 Q 50,55 85,25 Q 50,45 15,25  (широкий)
        const leftX = 20 - openFactor * 8;      // от 20 до 12
        const rightX = 80 + openFactor * 8;     // от 80 до 88
        const midTopY = 22 + openFactor * 8;    // верхняя дуга поднимается
        const bottomCurve = 28 + openFactor * 28;  // низкая дуга (открытый рот)
        
        const d = `M ${leftX},24 Q 50,${midTopY} ${rightX},24 Q 50,${bottomCurve} ${leftX},24`;
        mouthPath.setAttribute('d', d);
        
        // Если очень открыт — делаем язык/тень
        if(openFactor > 0.7) {
            mouthPath.setAttribute('fill', '#ff758f');
        } else {
            mouthPath.setAttribute('fill', '#ff4d6d');
        }
    }
    
    // Плавный цикл анимации (чтобы рот "дышал" во время речи)
    let targetIntensity = 0.0;
    function animateMouth() {
        if(!animationFrame) {
            function step() {
                // Плавное приближение к целевой интенсивности
                const diff = targetIntensity - mouthIntensity;
                mouthIntensity += diff * 0.35;
                if(Math.abs(diff) < 0.01) mouthIntensity = targetIntensity;
                updateMouthShape(mouthIntensity * mouthSensitivity);
                animationFrame = requestAnimationFrame(step);
            }
            step();
        }
    }
    animateMouth();
    
    // Эмуляция открытия рта по громкости/буквам во время синтеза речи
    // Используем анализатор громкости + виртуальные "гласные" для естественности
    let audioContext = null;
    let mediaStream = null;
    let sourceNode = null;
    let analyser = null;
    
    function startLipSyncFromAudio() {
        if(audioContext) return;
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            // Не подключаем к динамикам, просто создаём узел для анализа, но к сожалению SpeechSynthesis не даёт raw audio.
            // Поэтому используем более хитрый метод: во время речи эмулируем вибрацию на основе времени и распознавания букв.
            // Чтобы рот реально шевелился от произносимых слов — будем детектить гласные через "тайминг"
        } catch(e) { console.warn(e); }
    }
    
    // ГЕНИАЛЬНЫЙ МЕТОД: шевелим ротом синхронно с произносимым текстом (без реального аудио, но очень живо)
    function simulateLipSyncWhileSpeaking(text) {
        // Из текста извлекаем гласные и согласные, создаём "волну" открытия рта во времени
        const vowels = /[аоэиуыеёюя]/i;
        const hardVowels = /[аоэуы]/i;
        let lastUpdate = 0;
        let wordIndex = 0;
        const chars = text.split('');
        const durationPerChar = 80; // мс на символ (примерно)
        
        function stepLipSync() {
            if(!isSpeakingNow) return;
            const now = Date.now();
            const progress = now - startSpeakingTime;
            const charPos = Math.floor(progress / durationPerChar);
            if(charPos < chars.length && charPos >= 0) {
                let ch = chars[charPos];
                let intensity = 0.2;
                if(vowels.test(ch)) {
                    intensity = hardVowels.test(ch) ? 0.95 : 0.75;
                    // добавляем небольшую пульсацию
                    intensity += Math.sin(now * 0.025) * 0.1;
                } else if(ch.match(/[бвгджзйклмнпрстфхцчшщ]/i)) {
                    intensity = 0.35;
                } else {
                    intensity = 0.2;
                }
                targetIntensity = Math.min(1.0, intensity * (0.8 + mouthSensitivity*0.5));
            } else if(charPos >= chars.length) {
                targetIntensity = 0.0;
                return;
            }
            if(isSpeakingNow) requestAnimationFrame(() => stepLipSync());
        }
        let startSpeakingTime = Date.now();
        stepLipSync();
    }
    
    // Озвучка текста с синхронизацией губ
    async function speakText(text) {
        if(!text.trim()) {
            statusDiv.innerText = '✏️ Напиши что-нибудь';
            return;
        }
        if(currentUtterance) {
            window.speechSynthesis.cancel();
            isSpeakingNow = false;
            targetIntensity = 0.0;
        }
        isSpeakingNow = true;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ru-RU';
        utterance.rate = parseFloat(rateSlider.value);
        utterance.pitch = parseFloat(pitchSlider.value);
        utterance.volume = 1.0;
        if(selectedVoice) utterance.voice = selectedVoice;
        
        utterance.onstart = () => {
            statusDiv.innerText = '🔊 Аватар говорит... рот шевелится!';
            startLipSyncFromAudio();
            simulateLipSyncWhileSpeaking(text);
        };
        utterance.onend = () => {
            isSpeakingNow = false;
            targetIntensity = 0.0;
            statusDiv.innerText = '✅ Готово! Напиши новую фразу.';
            currentUtterance = null;
        };
        utterance.onerror = () => {
            isSpeakingNow = false;
            targetIntensity = 0.0;
            statusDiv.innerText = '❌ Ошибка речи';
        };
        currentUtterance = utterance;
        window.speechSynthesis.speak(utterance);
    }
    
    // ---------- ЗАГРУЗКА ФОТО ----------
    photoUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                userPhoto.src = ev.target.result;
                avatarFrame.classList.remove('default-mode');
                statusDiv.innerText = '✅ Фото загружено! Теперь рот будет поверх твоего лица.';
            };
            reader.readAsDataURL(file);
        }
    });
    resetAvatar.addEventListener('click', () => {
        avatarFrame.classList.add('default-mode');
        userPhoto.src = '';
        statusDiv.innerText = '🎭 Мультяшный режим. Рот тоже шевелится!';
    });
    
    // ГОЛОСА
    function loadVoices() {
        function populate() {
            const voices = window.speechSynthesis.getVoices();
            const russianVoices = voices.filter(v => v.lang.includes('ru') || v.name.toLowerCase().includes('russian'));
            voiceSelect.innerHTML = '';
            const list = russianVoices.length ? russianVoices : voices;
            list.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.name;
                opt.textContent = `${v.name} (${v.lang})`;
                voiceSelect.appendChild(opt);
            });
            if(voiceSelect.options.length) selectedVoice = list[0];
            voiceSelect.addEventListener('change', () => {
                selectedVoice = voices.find(v => v.name === voiceSelect.value);
            });
        }
        if(window.speechSynthesis.getVoices().length) populate();
        else window.speechSynthesis.onvoiceschanged = populate;
    }
    loadVoices();
    
    rateSlider.addEventListener('input', () => { rateVal.innerText = rateSlider.value; });
    pitchSlider.addEventListener('input', () => { pitchVal.innerText = pitchSlider.value; });
    mouthSenseSlider.addEventListener('input', () => { mouthSensitivity = parseFloat(mouthSenseSlider.value); senseVal.innerText = mouthSensitivity; });
    
    speakBtn.addEventListener('click', () => {
        const txt = textInput.value.trim();
        if(txt) speakText(txt);
        else statusDiv.innerText = '✏️ Напиши текст!';
    });
    
    // ДИКТОФОН
    function initSpeechRecog() {
        if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            statusDiv.innerText = '❌ Диктофон не поддерживается в этом браузере. Используй Chrome.';
            return false;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'ru-RU';
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.onstart = () => {
            isRecording = true;
            recordBtn.classList.add('recording');
            recordBtn.innerText = '⏹️';
            statusDiv.innerText = '🎙️ Слушаю... скажи фразу!';
        };
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            textInput.value = transcript;
            recognizedBox.style.display = 'block';
            recognizedBox.innerText = `🎤 Распознано: "${transcript}"`;
            speakText(transcript);
        };
        recognition.onerror = () => {
            statusDiv.innerText = '❌ Ошибка микрофона';
            stopRecording();
        };
        recognition.onend = () => stopRecording();
        return true;
    }
    function stopRecording() {
        isRecording = false;
        recordBtn.classList.remove('recording');
        recordBtn.innerText = '🎙️';
        if(!statusDiv.innerText.includes('Говорит')) statusDiv.innerText = '🎙️ Готов';
    }
    recordBtn.addEventListener('click', () => {
        if(!recognition && !initSpeechRecog()) return;
        if(isRecording) { recognition.stop(); stopRecording(); }
        else { recognition.start(); }
    });
    
    // пример текста
    textInput.value = "Привет! Смотри, мой рот теперь реально шевелится, когда я говорю по-русски!";
</script>
</body>
</html>
